name: Composer Test

on: [pull_request]

jobs:
  test:
    if: github.event.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ['8.2', '8.3']

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: "Setup PHP"
      uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2.37.0
      with:
        php-version: ${{ matrix.php-version }}

    - name: "Install system dependencies"
      run: sudo apt-get update && sudo apt-get install -y hunspell hunspell-en-gb

    - name: "Cache Composer dependencies"
      id: composer-cache
      run: echo "::set-output name=dir::$(composer config cache-files-dir)"

    - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ${{ steps.composer-cache.outputs.dir }}
        key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
        restore-keys: ${{ runner.os }}-composer-

    - name: "Check Composer lock file is up to date"
      run: composer validate --no-check-all

    - name: "Install Composer dependencies"
      run: |
        chmod +x bin/* && sleep 1
        bin/composer-auth.sh
        composer install --no-progress --prefer-dist --optimize-autoloader
        rm -f auth.json
      env:
        ACF_PRO_LICENSE: ${{ secrets.ACF_PRO_LICENSE }}
        RELEVANSSI_API_KEY: ${{ secrets.RELEVANSSI_API_KEY }}

    - name: "Run tests"
      run: make test

name: Composer Test

on: [pull_request]

jobs:
  test:
    if: github.event.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ['8.2', '8.3']

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: "Setup PHP"
      uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2.37.2
      with:
        php-version: ${{ matrix.php-version }}

    - name: "Install system dependencies"
      run: sudo apt-get update && sudo apt-get install -y hunspell hunspell-en-gb

    - name: "Cache Composer dependencies"
      id: composer-cache
      run: echo "::set-output name=dir::$(composer config cache-files-dir)"

    - uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
      with:
        path: ${{ steps.composer-cache.outputs.dir }}
        key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
        restore-keys: ${{ runner.os }}-composer-

    - name: "Check Composer lock file is up to date"
      run: composer validate --no-check-all

    - name: "Install Composer dependencies"
      run: |
        chmod +x bin/* && sleep 1
        bin/composer-auth.sh
        composer install --no-progress --prefer-dist --optimize-autoloader
        rm -f auth.json
      env:
        ACF_PRO_LICENSE: ${{ secrets.ACF_PRO_LICENSE }}
        RELEVANSSI_API_KEY: ${{ secrets.RELEVANSSI_API_KEY }}

    - name: "Run tests"
      run: make test

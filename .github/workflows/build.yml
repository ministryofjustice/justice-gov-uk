name: "Build Image"

on:
  workflow_call:
    outputs:
      registry:
        description: "AWS registry where the ECR is located"
        value: ${{ jobs.image_build.outputs.registry }}

jobs:
  image_build:
    name: "Build"
    runs-on: ubuntu-latest
    outputs:
      registry: ${{ steps.ecr-login.outputs.registry }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: "Checkout"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: "Configuring AWS credentials"
        uses: aws-actions/configure-aws-credentials@acca2b1b2070338fb9fd1ca27ecee81d687e58e5 # v6.1.2
        with:
          role-to-assume: ${{ secrets.ECR_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.ECR_REGION }}

      - name: "Logging into ECR"
        uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419 # v2.1.5
        id: ecr-login

      - name: "Build & Push to ECR"
        run: |
          docker image build -t $REGISTRY/$REPOSITORY:fpm-$IMAGE_TAG --target build-fpm \
            --build-arg ACF_PRO_LICENSE --build-arg RELEVANSSI_API_KEY --build-arg IMAGE_TAG .
          
          docker image build -t $REGISTRY/$REPOSITORY:nginx-$IMAGE_TAG --target build-nginx \
             --build-arg ACF_PRO_LICENSE --build-arg RELEVANSSI_API_KEY .

          docker image build -t $REGISTRY/$REPOSITORY:s3-push-$IMAGE_TAG --target build-s3-push \
            --build-arg ACF_PRO_LICENSE --build-arg RELEVANSSI_API_KEY --build-arg IMAGE_TAG .
          
          docker image push $REGISTRY/$REPOSITORY:fpm-$IMAGE_TAG
          docker image push $REGISTRY/$REPOSITORY:nginx-$IMAGE_TAG
          docker image push $REGISTRY/$REPOSITORY:s3-push-$IMAGE_TAG

        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
          ACF_PRO_LICENSE: ${{ secrets.ACF_PRO_LICENSE }}
          RELEVANSSI_API_KEY: ${{ secrets.RELEVANSSI_API_KEY }}
